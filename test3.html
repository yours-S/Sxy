<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<p>点击下面的按钮，获取i小于5的数字</p>
<button onclick="myFunction()">点击这里</button>
<p id="demo"></p>
<script>
    function myFunction(){
        var x="",i=0;
        while (i<5){
            x=x + "该数字为" + i + "<br>";
            i++;
        } 
        document.getElementById("demo").innerHTML=x;
    }
    
</script>

</body>
</html>
