<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <p id="demo"></p>

    <script>
        class Runoob {
            constructor(name, year) {
                this.name=name;
                this.year=year;
            }
            age() {
                let date = new Date();
                return date.getFullYear() - this.year;
            }
        }
        let runoob = new Runoob("我今年", 2002);
        document.getElementById("demo").innerHTML = "我今年" + runoob.age() + "岁了";
    </script>

</body>
</html>
