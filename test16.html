<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div onmousedown="mDown(this)" onmouseup="mUp(this)" style="background-color:#D94A38;width:120px;height:20px;padding:40px;">Mouse Over Me</div>
    <script>
    function mDown(obj){
	    obj.innerHTML="Thank You"
    }
    function mUp(obj){
	    obj.innerHTML="Mouse Over Me"
    }
    </script>

</body>
</html>
