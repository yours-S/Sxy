<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<p>点击这个按钮，查看今天星期几</p>
<button onclick="myFunction()">点击这里</button>
<p id="demo"></p>
<script>
    function myFunction(){
        var x="";
        var day=new Date().getDay();
        switch (day){
            case 0:x="今天是星期日";
            break;
            // case 1:x="今天是星期一";
            // break;
            case 2:x="今天是星期二";
            break;
            case 3:x="今天是星期三";
            break;
            case 4:x="今天是星期四";
            break;
            case 5:x="今天是星期五";
            break;
            case 6:x="今天是星期六";
            break;
            default:
            x="错误"
        }
        document.getElementById("demo").innerHTML=x;
    }
</script>

</body>
</html>
