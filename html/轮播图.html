<!DOCTYPE html>  
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/轮播图.css">
    <script src="../js/轮播图.js"></script>
</head>
<body>

  <div class="carousel-container">

  </div>
