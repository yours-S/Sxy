<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<p>typeof 操作符返回变量或表达式的类型。</p>
<p id="demo"></p>
<script>
    document.getElementById("demo").innerHTML=
        typeof "LiHua" + "<br>" +
        typeof 5 + "<br>" +
        typeof false + "<br>" +
	    typeof [1,2,3,4] + "<br>" +
	    typeof {name:'john', age:34};
</script>

</body>
</html>
